<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PhonePe Payment Gateway | Status Check</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4a1e9e, #7b2cbf);
        }

        .success-container {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: #dbc355;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 40px;
        }

        .failed-icon {
            width: 80px;
            height: 80px;
            background: #ad0808;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 40px;
        }

        .success-title {
            color: #2e7d32;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .failed-title {
            color: #ad0808;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .transaction-id {
            color: #666;
            margin-bottom: 20px;
        }

        .home-button {
            padding: 12px 24px;
            background: #7b2cbf;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .bg-success {
            background: #4CAF50;
        }

        .d-none {
            display: none;
        }
        .loader {
    border: 4px solid #fff;
    border-top: 4px solid rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
    </style>
</head>
<body>
    <div class="success-container d-none" id="success-container">
        <div class="success-icon" id="success-icon">
            <div class="loader" id="loader"></div>
            <span id="checkmark" class="d-none"></span>
        </div>
        <h1 class="success-title" id="success-title"></h1>
        <p class="transaction-id">Transaction ID: <span id="txn-id"></span></p>
        <a href="/payments" class="home-button">Back to Home</a>
        <button id="download-invoice" class="home-button d-none" style="margin-top:1rem;">Download Invoice</button>
        <div id="invoice-data" style="display:none;"></div>
    </div>
    <script>
    // Load jsPDF from CDN
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    document.head.appendChild(script);

    document.addEventListener('DOMContentLoaded', function () {
        const successContainer = document.getElementById('success-container');
        const successIcon = document.getElementById('success-icon');
        const successTitle = document.getElementById('success-title');
        const txnid = document.getElementById('txn-id');
        const urlParams = new URLSearchParams(window.location.search);
        txnid.textContent = urlParams.get('txnId') || 'N/A';
        txnid.classList.add('d-none');

        const loader = document.getElementById('loader');
        const checkmark = document.getElementById('checkmark');
        const downloadBtn = document.getElementById('download-invoice');
        const invoiceDataDiv = document.getElementById('invoice-data');
        successContainer.classList.remove('d-none');

        fetch("paymentstatus.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    txnid: txnid.textContent
                })
            })
            .then(response => response.json())
            .then(data => {
                if(data.wpResponse.state != 'COMPLETED') {
                    setTimeout(function(){
                        successTitle.innerText = "Payment Failed!";
                        successTitle.classList.add('failed-title');
                        successTitle.classList.remove('success-title');
                        successIcon.innerText = 'X';
                        successIcon.classList.add('failed-icon');
                        successIcon.classList.remove('success-icon');
                        successIcon.classList.remove('bg-success');
                        txnid.textContent = data.wpResponse.order_id;
                        loader.style.display = 'none';
                        checkmark.classList.remove('d-none');
                        txnid.classList.remove('d-none');
                        successContainer.classList.remove('d-none');
                    }, 300);
                } else {
                    setTimeout(function(){
                        successTitle.innerText = "Payment Successful!";
                        successTitle.classList.remove('failed-title');
                        successTitle.classList.add('success-title');
                        successIcon.innerText = '✓';
                        successIcon.classList.remove('failed-icon');
                        successIcon.classList.add('success-icon');
                        successIcon.classList.add('bg-success');
                        txnid.textContent = data.wpResponse.order_id;
                        loader.style.display = 'none';
                        checkmark.classList.remove('d-none');
                        txnid.classList.remove('d-none');
                        successContainer.classList.remove('d-none');

                        // Show Download Invoice button
                        downloadBtn.classList.remove('d-none');

                        // Prepare invoice data
                        // You may need to adjust these fields based on your backend response
                        const invoice = {
                            company: 'JD Foundation',
                            companyEmail: 'info@jdfoundation.org',
                            companyPhone: '+91-89012-42757',
                            userName: data.wpResponse.username || 'N/A',
                            userPhone: data.wpResponse.phone || 'N/A',
                            amount: data.wpResponse.amount ? (parseInt(data.wpResponse.amount)/100).toFixed(2) : 'N/A',
                            txnId: data.wpResponse.order_id || txnid.textContent,
                            date: new Date().toLocaleString()
                        };
                        invoiceDataDiv.textContent = JSON.stringify(invoice);

                        // Download PDF handler
                        downloadBtn.onclick = function() {
                            if (!window.jspdf && !window.jspdf?.jsPDF) {
                                alert('PDF library not loaded yet. Please wait a moment and try again.');
                                return;
                            }
                            const { jsPDF } = window.jspdf;
                            const doc = new jsPDF();
                            doc.setFontSize(16);
                            doc.text('Invoice', 105, 20, {align: 'center'});
                            doc.setFontSize(12);
                            doc.text(`Company Name: ${invoice.company}`, 20, 40);
                            doc.text(`Company Email: ${invoice.companyEmail}`, 20, 48);
                            doc.text(`Company Phone: ${invoice.companyPhone}`, 20, 56);
                            doc.text(`User Name: ${invoice.userName}`, 20, 70);
                            doc.text(`User Phone: ${invoice.userPhone}`, 20, 78);
                            doc.text(`Amount: ₹${invoice.amount}`, 20, 86);
                            doc.text(`Transaction ID: ${invoice.txnId}`, 20, 94);
                            doc.text(`Date: ${invoice.date}`, 20, 102);
                            doc.save(`Invoice_${invoice.txnId}.pdf`);
                        };
                    }, 300);
                }
            })
            .catch(error => console.error("Error:", error));
    });
    </script>
</body>
</html>
