<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PhonePe Payment Gateway | Status Check</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #4a1e9e, #7b2cbf);
        }

        .success-container {
            background: white;
            border-radius: 16px;
            padding: 2rem;
            width: 90%;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .success-icon {
            width: 80px;
            height: 80px;
            background: #dbc355;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 40px;
        }

        .failed-icon {
            width: 80px;
            height: 80px;
            background: #ad0808;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 20px;
            color: white;
            font-size: 40px;
        }

        .success-title {
            color: #2e7d32;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .failed-title {
            color: #ad0808;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .transaction-id {
            color: #666;
            margin-bottom: 20px;
        }

        .home-button {
            padding: 12px 24px;
            background: #7b2cbf;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
        }

        .bg-success {
            background: #4CAF50;
        }

        .d-none {
            display: none;
        }
        .loader {
    border: 4px solid #fff;
    border-top: 4px solid rgba(255, 255, 255, 0.3);
    border-radius: 50%;
    width: 40px;
    height: 40px;
    animation: spin 1s linear infinite;
}

@keyframes spin {
    0% { transform: rotate(0deg); }
    100% { transform: rotate(360deg); }
}
    </style>
</head>
<body>
    <div class="success-container d-none" id="success-container">
        <div class="success-icon" id="success-icon">
            <div class="loader" id="loader"></div>
            <span id="checkmark" class="d-none"></span>
        </div>
        <h1 class="success-title" id="success-title"></h1>
        <p class="transaction-id">Transaction ID: <span id="txn-id"></span></p>
        <a href="/payments" class="home-button">Back to Home</a>
        <button id="download-invoice" class="home-button d-none" style="margin-top:1rem;">Download Invoice</button>
        <div id="invoice-data" style="display:none;"></div>
    </div>
    <script>
    // Load jsPDF from CDN
    const script = document.createElement('script');
    script.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    document.head.appendChild(script);

    document.addEventListener('DOMContentLoaded', function () {
        const successContainer = document.getElementById('success-container');
        const successIcon = document.getElementById('success-icon');
        const successTitle = document.getElementById('success-title');
        const txnid = document.getElementById('txn-id');
        const urlParams = new URLSearchParams(window.location.search);
        txnid.textContent = urlParams.get('txnId') || 'N/A';
        txnid.classList.add('d-none');

        const loader = document.getElementById('loader');
        const checkmark = document.getElementById('checkmark');
        const downloadBtn = document.getElementById('download-invoice');
        const invoiceDataDiv = document.getElementById('invoice-data');
        successContainer.classList.remove('d-none');

        fetch("paymentstatus.php", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    txnid: txnid.textContent
                })
            })
            .then(response => response.json())
            .then(data => {
                if(data.wpResponse.state != 'COMPLETED') {
                    setTimeout(function(){
                        successTitle.innerText = "Payment Failed!";
                        successTitle.classList.add('failed-title');
                        successTitle.classList.remove('success-title');
                        successIcon.innerText = 'X';
                        successIcon.classList.add('failed-icon');
                        successIcon.classList.remove('success-icon');
                        successIcon.classList.remove('bg-success');
                        txnid.textContent = data.wpResponse.order_id;
                        loader.style.display = 'none';
                        checkmark.classList.remove('d-none');
                        txnid.classList.remove('d-none');
                        successContainer.classList.remove('d-none');
                    }, 300);
                } else {
                    setTimeout(function(){
                        successTitle.innerText = "Payment Successful!";
                        successTitle.classList.remove('failed-title');
                        successTitle.classList.add('success-title');
                        successIcon.innerText = '✓';
                        successIcon.classList.remove('failed-icon');
                        successIcon.classList.add('success-icon');
                        successIcon.classList.add('bg-success');
                        txnid.textContent = data.wpResponse.order_id;
                        loader.style.display = 'none';
                        checkmark.classList.remove('d-none');
                        txnid.classList.remove('d-none');
                        successContainer.classList.remove('d-none');

                        // Show Download Invoice button
                        downloadBtn.classList.remove('d-none');

                        // Prepare invoice data
const invoice = {
    company: 'JD Foundation',
    companyEmail: 'Jantrifoundation@gmail.com',
    companyPhone: '+91-89012-42757',
    userName: data.wpResponse.username || 'N/A',
    userPhone: data.wpResponse.phone || 'N/A',
    amount: data.wpResponse.amount ? (parseInt(data.wpResponse.amount)/100).toFixed(2) : 'N/A',
    txnId: data.wpResponse.order_id || txnid.textContent,
    date: new Date().toLocaleString()
};
invoiceDataDiv.textContent = JSON.stringify(invoice);

// Enhanced PDF generation with professional design
downloadBtn.onclick = function() {
    if (!window.jspdf && !window.jspdf?.jsPDF) {
        alert('PDF library not loaded yet. Please wait a moment and try again.');
        return;
    }
    
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    
    // Colors
    const primaryColor = [41, 128, 185]; // Blue
    const secondaryColor = [52, 73, 94]; // Dark gray
    const lightGray = [236, 240, 241];
    const darkGray = [127, 140, 141];
    
    // Header background
    doc.setFillColor(...primaryColor);
    doc.rect(0, 0, 210, 35, 'F');
    
    // Company logo area (placeholder circle)
    doc.setFillColor(255, 255, 255);
    doc.circle(25, 17, 8, 'F');
    doc.setTextColor(...primaryColor);
    doc.setFontSize(14);
    doc.setFont(undefined, 'bold');
    doc.text('JD', 25, 20, {align: 'center'});
    
    // Company name in header
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(24);
    doc.setFont(undefined, 'bold');
    doc.text('JD FOUNDATION', 40, 20);
    
    // Invoice title
    doc.setFontSize(16);
    doc.text('INVOICE', 170, 20);
    
    // Company details section
    doc.setTextColor(...lightGray);
    doc.setFontSize(10);
    doc.setFont(undefined, 'normal');
    doc.text('Email: ' + invoice.companyEmail, 40, 28);
    doc.text('Phone: ' + invoice.companyPhone, 40, 32);
    
    // Invoice details box
    doc.setFillColor(...lightGray);
    doc.rect(140, 45, 60, 25, 'F');
    doc.setTextColor(...secondaryColor);
    doc.setFontSize(10);
    doc.setFont(undefined, 'bold');
    doc.text('Invoice Details', 145, 52);
    doc.setFont(undefined, 'normal');
    doc.text('Invoice #: ' + invoice.txnId.substring(0, 8), 145, 58);
    doc.text('Date: ' + new Date().toLocaleDateString(), 145, 64);
    
    // Bill to section
    doc.setTextColor(...primaryColor);
    doc.setFontSize(14);
    doc.setFont(undefined, 'bold');
    doc.text('BILL TO:', 20, 85);
    
    doc.setTextColor(...secondaryColor);
    doc.setFontSize(12);
    doc.setFont(undefined, 'normal');
    doc.text(invoice.userName, 20, 95);
    doc.text('Phone: ' + invoice.userPhone, 20, 103);
    
    // Transaction details table header
    doc.setFillColor(...primaryColor);
    doc.rect(20, 120, 170, 12, 'F');
    doc.setTextColor(255, 255, 255);
    doc.setFontSize(11);
    doc.setFont(undefined, 'bold');
    doc.text('Description', 25, 128);
    doc.text('Transaction ID', 90, 128);
    doc.text('Amount', 160, 128);
    
    // Transaction details table content
    doc.setFillColor(255, 255, 255);
    doc.rect(20, 132, 170, 15, 'F');
    doc.setDrawColor(...lightGray);
    doc.rect(20, 132, 170, 15, 'S');
    
    doc.setTextColor(...secondaryColor);
    doc.setFontSize(10);
    doc.setFont(undefined, 'normal');
    doc.text('Payment Transaction', 25, 140);
    doc.text(invoice.txnId, 90, 140);
    doc.text('INR ' + invoice.amount, 160, 140);
    
    // Total section
    doc.setFillColor(...lightGray);
    doc.rect(130, 155, 60, 25, 'F');
    doc.setTextColor(...secondaryColor);
    doc.setFontSize(11);
    doc.setFont(undefined, 'bold');
    doc.text('TOTAL AMOUNT', 135, 165);
    doc.setFontSize(16);
    doc.setTextColor(...primaryColor);
    doc.text('INR ' + invoice.amount, 135, 175);
    
    // Thank you note
    doc.setTextColor(...darkGray);
    doc.setFontSize(12);
    doc.setFont(undefined, 'italic');
    doc.text('Thank you for your payment!', 105, 200, {align: 'center'});
    
    // Footer
    doc.setFontSize(8);
    doc.setFont(undefined, 'normal');
    doc.text('This is a computer generated invoice.', 105, 270, {align: 'center'});
    doc.text('For any queries, please contact us at ' + invoice.companyEmail, 105, 275, {align: 'center'});
    
    // Add border to the entire document
    doc.setDrawColor(...lightGray);
    doc.setLineWidth(0.5);
    doc.rect(10, 40, 190, 230, 'S');
    
    // Save the PDF
    doc.save(`Invoice_${invoice.txnId}.pdf`);
};
                    }, 300);
                }
            })
            .catch(error => console.error("Error:", error));
    });
    </script>
</body>
</html>
